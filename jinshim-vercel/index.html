<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진심의 무게 - 엄벌 탄원서 작성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>const _w=console.warn;console.warn=(...a)=>{if(a[0]?.includes?.('cdn.tailwindcss.com'))return;_w.apply(console,a)};</script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/docx@8.2.0/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark': '#0f0f0f',
                        'gray': { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 300: '#d4d4d8', 400: '#a1a1aa', 500: '#71717a', 600: '#52525b', 700: '#3f3f46', 800: '#27272a', 900: '#18181b' },
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Noto Sans KR', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { overscroll-behavior: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        .animate-spin { animation: spin 1s linear infinite; }
        .delay-100 { animation-delay: 0.1s; opacity: 0; }
        .delay-200 { animation-delay: 0.2s; opacity: 0; }
        .delay-300 { animation-delay: 0.3s; opacity: 0; }
        input:focus, textarea:focus { outline: none; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // === ICONS ===
        const Icons = {
            ArrowRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
            ArrowLeft: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>,
            Copy: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>,
            Share: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>,
            Loader: () => <svg className="w-5 h-5 animate-spin" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.2-8.6"/></svg>,
            Scale: () => <svg className="w-12 h-12" fill="none" stroke="currentColor" strokeWidth="1.2" viewBox="0 0 24 24"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10M12 3v18M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>,
            Shield: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Kakao: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.85 1.89 5.35 4.72 6.77-.15.53-.96 3.43-.99 3.64 0 0-.02.13.07.18.09.05.19.01.19.01.25-.03 2.91-1.89 3.36-2.21.86.13 1.75.2 2.65.2 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Close: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>,
            Zap: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
        };

        // === DATA ===
        const damageOptions = [
            { id: 'insomnia', label: '불면증', desc: '잠을 이루지 못함' },
            { id: 'anxiety', label: '대인기피', desc: '사람을 피하게 됨' },
            { id: 'suicidal', label: '자살충동', desc: '극단적 생각' },
            { id: 'daily', label: '일상파괴', desc: '정상 생활 불가' },
            { id: 'financial', label: '경제적 피해', desc: '직장, 수입 손실' },
            { id: 'ptsd', label: 'PTSD', desc: '외상 후 스트레스' },
            { id: 'depression', label: '우울증', desc: '지속적 우울감' },
            { id: 'panic', label: '공황장애', desc: '갑작스런 공포' },
            { id: 'trust', label: '신뢰상실', desc: '타인 불신' },
            { id: 'career', label: '경력단절', desc: '커리어 손상' },
            { id: 'family', label: '가족갈등', desc: '가정 내 문제' },
            { id: 'physical', label: '신체증상', desc: '몸의 이상 반응' },
        ];

        const attitudeOptions = [
            { id: 'noApology', label: '사과 없음', level: 'high' },
            { id: 'pressure', label: '합의 종용', level: 'high' },
            { id: 'mockery', label: '비웃음/조롱', level: 'critical' },
            { id: 'secondary', label: '2차 가해', level: 'critical' },
            { id: 'copyPaste', label: '반성문 복붙', level: 'mid' },
            { id: 'blaming', label: '피해자 탓', level: 'critical' },
            { id: 'denial', label: '혐의 부인', level: 'high' },
            { id: 'threat', label: '협박/회유', level: 'critical' },
            { id: 'spreading', label: '소문 유포', level: 'critical' },
            { id: 'stalking', label: '접근 시도', level: 'critical' },
        ];

        const relationships = ['연인/전 연인', '배우자/전 배우자', '직장 관계', '지인/친구', '가족/친척', '모르는 사람', '온라인 지인', '기타'];

        const reviewPlans = [
            { id: 'basic', badge: '🥉', name: '기본 검토', price: 33000, priceText: '33,000원', desc: '형식/오탈자 검토', time: '24시간 내' },
            { id: 'standard', badge: '🥈', name: '정밀 검토', price: 77000, priceText: '77,000원', desc: '내용 보완 + 코멘트', time: '12시간 내', popular: true },
            { id: 'premium', badge: '🥇', name: '프리미엄', price: 165000, priceText: '165,000원', desc: '검토 + 전화상담 15분', time: '6시간 내' },
            { id: 'vip', badge: '💎', name: 'VIP', price: 330000, priceText: '330,000원', desc: '완전 재작성 + 상담', time: '당일' },
        ];

        const DAILY_LIMIT = 3;

        // === COMPONENTS ===

        // Landing Page
        const Landing = ({ onStart, usageInfo }) => (
            <div className="min-h-screen bg-dark flex flex-col items-center justify-center p-8 text-center relative overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-b from-gray-900 via-dark to-dark"></div>
                <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
                
                <div className="relative z-10 max-w-sm mx-auto">
                    <div className="fade-up mb-8 flex justify-center">
                        <div className="text-white/80">
                            <Icons.Scale />
                        </div>
                    </div>
                    
                    <h1 className="fade-up delay-100 text-3xl font-bold text-white tracking-tight mb-2">
                        진심의 무게
                    </h1>
                    <p className="fade-up delay-100 text-white/40 text-sm mb-10">
                        엄벌 탄원서 작성 도우미
                    </p>
                    
                    <p className="fade-up delay-200 text-white/70 text-lg leading-relaxed mb-8 font-light">
                        뭘 써야 할지 막막했던<br/>
                        엄벌 탄원서,<br/>
                        <span className="text-white font-normal">3분이면 완성됩니다</span>
                    </p>

                    <div className="fade-up delay-200 mb-8">
                        <div className="inline-flex items-center gap-2 bg-white/10 backdrop-blur px-4 py-2 rounded-full">
                            <Icons.Zap />
                            <span className="text-white/80 text-sm">
                                오늘 무료 {usageInfo.remaining}회 남음
                            </span>
                        </div>
                    </div>
                    
                    <button 
                        onClick={onStart}
                        disabled={usageInfo.remaining <= 0}
                        className={`fade-up delay-300 w-full font-semibold py-4 rounded-2xl btn-press transition-colors ${
                            usageInfo.remaining > 0 
                                ? 'bg-white text-dark hover:bg-gray-100' 
                                : 'bg-gray-700 text-gray-400 cursor-not-allowed'
                        }`}
                    >
                        {usageInfo.remaining > 0 ? '작성 시작하기' : '오늘 무료 사용 완료'}
                    </button>
                    
                    <p className="fade-up delay-300 text-white/30 text-xs mt-6">
                        신분증 뒷자리 노출 걱정 없이 · 무료
                    </p>
                </div>
            </div>
        );

        // Progress Bar
        const Progress = ({ step, total }) => (
            <div className="flex gap-1.5 mb-8">
                {Array.from({ length: total }, (_, i) => (
                    <div 
                        key={i} 
                        className={`h-1 rounded-full flex-1 transition-all duration-300 ${
                            i < step ? 'bg-dark' : i === step ? 'bg-dark' : 'bg-gray-200'
                        }`}
                    />
                ))}
            </div>
        );

        // Chip Button
        const Chip = ({ selected, onClick, children, variant = 'default' }) => {
            const base = "px-4 py-3 rounded-xl text-sm font-medium transition-all btn-press border-2 text-left";
            const styles = {
                default: selected 
                    ? "bg-dark text-white border-dark" 
                    : "bg-white text-gray-700 border-gray-200 hover:border-gray-300",
                danger: selected 
                    ? "bg-red-600 text-white border-red-600" 
                    : "bg-white text-gray-700 border-gray-200 hover:border-red-200",
            };
            return (
                <button onClick={onClick} className={`${base} ${styles[variant]}`}>
                    {children}
                </button>
            );
        };

        // Main App
        function App() {
            const [page, setPage] = useState('landing');
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({
                caseNumber: '',
                defendant: '',
                relationship: '',
                damages: [],
                attitudes: [],
                message: '',
                isVictim: null,
            });
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState(null);
            const [usageInfo, setUsageInfo] = useState({ used: 0, remaining: DAILY_LIMIT, limit: DAILY_LIMIT });

            const totalSteps = 5;

            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const storageKey = `petition_usage_${today}`;
                const stored = localStorage.getItem(storageKey);
                const used = stored ? parseInt(stored, 10) : 0;
                setUsageInfo({
                    used,
                    remaining: Math.max(0, DAILY_LIMIT - used),
                    limit: DAILY_LIMIT
                });

                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('petition_usage_') && !key.includes(today)) {
                        localStorage.removeItem(key);
                    }
                });
            }, []);

            const incrementLocalUsage = () => {
                const today = new Date().toISOString().split('T')[0];
                const storageKey = `petition_usage_${today}`;
                const stored = localStorage.getItem(storageKey);
                const used = (stored ? parseInt(stored, 10) : 0) + 1;
                localStorage.setItem(storageKey, used.toString());
                setUsageInfo({
                    used,
                    remaining: Math.max(0, DAILY_LIMIT - used),
                    limit: DAILY_LIMIT
                });
            };

            const toggleArray = (key, value) => {
                setForm(prev => ({
                    ...prev,
                    [key]: prev[key].includes(value) 
                        ? prev[key].filter(v => v !== value)
                        : [...prev[key], value]
                }));
            };

            const canProceed = () => {
                switch(step) {
                    case 0: return form.isVictim !== null;
                    case 1: return form.caseNumber && form.defendant && form.relationship;
                    case 2: return form.damages.length > 0;
                    case 3: return true;
                    case 4: return true;
                    default: return false;
                }
            };

            const generate = async () => {
                if (usageInfo.remaining <= 0) {
                    setShowReviewModal(true);
                    return;
                }

                setLoading(true);
                setError('');

                const damageLabels = form.damages.map(id => damageOptions.find(o => o.id === id)?.label).filter(Boolean);
                const attitudeLabels = form.attitudes.map(id => attitudeOptions.find(o => o.id === id)?.label).filter(Boolean);

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            caseNumber: form.caseNumber,
                            defendant: form.defendant,
                            relationship: form.relationship,
                            damages: damageLabels,
                            attitudes: attitudeLabels,
                            message: form.message,
                            isVictim: form.isVictim
                        })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        if (data.error === 'RATE_LIMIT_EXCEEDED') {
                            setUsageInfo({ used: DAILY_LIMIT, remaining: 0, limit: DAILY_LIMIT });
                            setShowReviewModal(true);
                            return;
                        }
                        throw new Error(data.error || data.message || 'API 오류가 발생했습니다');
                    }

                    setResult(data.content);
                    incrementLocalUsage();
                    if (data.usage) {
                        setUsageInfo(data.usage);
                    }
                    setPage('result');

                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const saveAsDocx = async () => {
                try {
                    const { Document, Packer, Paragraph, TextRun, AlignmentType, LineRuleType } = docx;
                    
                    const lines = result.split('\n');
                    const paragraphs = [];
                    
                    lines.forEach((line) => {
                        const trimmed = line.trim();
                        
                        if (trimmed === '탄원서' || trimmed === '탄 원 서') {
                            paragraphs.push(new Paragraph({
                                children: [new TextRun({ text: trimmed, font: '휴먼명조', size: 40, bold: true })],
                                alignment: AlignmentType.CENTER,
                                spacing: { after: 400, line: 375, lineRule: LineRuleType.AUTO },
                            }));
                        } else if (trimmed === '') {
                            paragraphs.push(new Paragraph({ children: [], spacing: { after: 200 } }));
                        } else {
                            paragraphs.push(new Paragraph({
                                children: [new TextRun({ text: trimmed, font: '휴먼명조', size: 24 })],
                                spacing: { after: 120, line: 375, lineRule: LineRuleType.AUTO },
                            }));
                        }
                    });
                    
                    const doc = new Document({
                        sections: [{
                            properties: { page: { margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } },
                            children: paragraphs,
                        }],
                    });
                    
                    const blob = await Packer.toBlob(doc);
                    const now = new Date();
                    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                    saveAs(blob, `엄벌탄원서_${form.defendant || '피고인'}_${dateStr}.docx`);
                    
                } catch (err) {
                    console.error('DOCX 생성 오류:', err);
                    alert('파일 생성 중 오류가 발생했습니다: ' + err.message);
                }
            };

            const shareKakao = () => {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({ title: '엄벌 탄원서 - 진심의 무게', text: '탄원서 작성을 부탁드립니다.', url: url });
                } else {
                    window.open(`https://story.kakao.com/share?url=${encodeURIComponent(url)}`, '_blank');
                }
            };

            // Review Modal (포트원 결제 완벽 장착)
            const ReviewModal = () => {
                const handlePayment = async () => {
                    if (!selectedPlan) {
                        alert('검토 등급을 선택해주세요');
                        return;
                    }

                    const planData = reviewPlans.find(p => p.id === selectedPlan);

                    try {
                        const response = await window.PortOne.requestPayment({
                            storeId: "store-6451a918-f7e0-451e-8994-83dcf09aeebe", 
                            channelKey: "channel-key-fee1bc60-79d5-41b4-86ad-a64c328c1fd3", 
                            paymentId: `order-${Date.now()}`,
                            orderName: `진심의 무게 문서 템플릿 - ${planData.name}`,
                            totalAmount: planData.price,
                            currency: "CURRENCY_KRW",
                            payMethod: "CARD",
                        });

                        if (response.code != null) {
                            return alert(`결제 실패: ${response.message}`);
                        }
                        
                        alert(`${planData.name} 결제가 완료되었습니다. 변호사가 곧 연락드립니다.`);
                        setShowReviewModal(false); 

                    } catch (error) {
                        console.error("결제 모듈 에러:", error);
                    }
                };

                return (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
                        <div className="bg-white w-full sm:max-w-md sm:rounded-3xl rounded-t-3xl max-h-[90vh] overflow-hidden fade-in">
                            <div className="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between">
                                <div>
                                    <h3 className="text-lg font-bold text-gray-900">
                                        {usageInfo.remaining <= 0 ? '무료 사용 완료' : '전문가 검토 신청'}
                                    </h3>
                                    <p className="text-sm text-gray-500">
                                        {usageInfo.remaining <= 0 
                                            ? '전문가 검토로 더 완벽한 탄원서를 받아보세요' 
                                            : '검토 등급을 선택해주세요'}
                                    </p>
                                </div>
                                <button 
                                    onClick={() => { setShowReviewModal(false); setSelectedPlan(null); }}
                                    className="p-2 -mr-2 text-gray-400 hover:text-gray-600"
                                >
                                    <Icons.Close />
                                </button>
                            </div>
                            
                            <div className="p-5 space-y-3 overflow-y-auto max-h-[60vh]">
                                {usageInfo.remaining <= 0 && (
                                    <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl mb-4">
                                        <p className="text-sm text-amber-800">
                                            💡 오늘 무료 사용 횟수를 모두 사용하셨습니다.<br/>
                                            전문가 검토를 통해 더 완성도 높은 탄원서를 받아보세요.
                                        </p>
                                    </div>
                                )}

                                {reviewPlans.map(plan => (
                                    <button
                                        key={plan.id}
                                        onClick={() => setSelectedPlan(plan.id)}
                                        className={`w-full p-4 rounded-2xl border-2 text-left transition-all btn-press relative ${
                                            selectedPlan === plan.id
                                                ? 'border-dark bg-dark text-white'
                                                : 'border-gray-200 hover:border-gray-300 bg-white'
                                        }`}
                                    >
                                        {plan.popular && (
                                            <span className={`absolute -top-2 right-4 text-xs font-bold px-2 py-0.5 rounded-full ${
                                                selectedPlan === plan.id ? 'bg-white text-dark' : 'bg-dark text-white'
                                            }`}>
                                                인기
                                            </span>
                                        )}
                                        <div className="flex items-start justify-between">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-lg">{plan.badge}</span>
                                                    <span className="font-semibold">{plan.name}</span>
                                                </div>
                                                <p className={`text-sm ${selectedPlan === plan.id ? 'text-white/70' : 'text-gray-500'}`}>
                                                    {plan.desc}
                                                </p>
                                            </div>
                                            <div className={`text-right ${selectedPlan === plan.id ? 'text-white' : 'text-gray-900'}`}>
                                                <span className="text-lg font-bold">{plan.priceText}</span>
                                            </div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                            
                            <div className="sticky bottom-0 bg-white border-t border-gray-100 p-5 space-y-3">
                                <button
                                    onClick={handlePayment}
                                    className={`w-full py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all ${
                                        selectedPlan 
                                            ? 'bg-dark text-white btn-press hover:bg-gray-800' 
                                            : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                    }`}
                                >
                                    💳 결제하고 검토 신청하기
                                </button>
                                <p className="text-center text-xs text-gray-400">
                                    포트원 안전 결제를 통해 진행됩니다
                                </p>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStep = () => {
                switch(step) {
                    case 0:
                        return (
                            <div className="fade-in">
                                <h2 className="text-xl font-semibold mb-2">작성자 확인</h2>
                                <p className="text-gray-500 text-sm mb-8">탄원서를 누가 작성하시나요?</p>
                                <div className="space-y-3">
                                    <button onClick={() => setForm({...form, isVictim: true})} className={`w-full p-5 rounded-2xl border-2 text-left transition-all btn-press ${form.isVictim === true ? 'border-dark bg-dark text-white' : 'border-gray-200 hover:border-gray-300'}`}>
                                        <div className="font-semibold mb-1">피해자 본인</div>
                                        <div className={`text-sm ${form.isVictim === true ? 'text-white/70' : 'text-gray-500'}`}>직접 탄원서를 작성합니다</div>
                                    </button>
                                    <button onClick={() => setForm({...form, isVictim: false})} className={`w-full p-5 rounded-2xl border-2 text-left transition-all btn-press ${form.isVictim === false ? 'border-dark bg-dark text-white' : 'border-gray-200 hover:border-gray-300'}`}>
                                        <div className="font-semibold mb-1">피해자 지인</div>
                                        <div className={`text-sm ${form.isVictim === false ? 'text-white/70' : 'text-gray-500'}`}>피해자를 대신해 탄원서를 작성합니다</div>
                                    </button>
                                </div>
                            </div>
                        );
                    case 1:
                        return (
                            <div className="fade-in">
                                <h2 className="text-xl font-semibold mb-2">사건 정보</h2>
                                <p className="text-gray-500 text-sm mb-8">기본적인 사건 정보를 입력해주세요</p>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm font-medium text-gray-700 mb-2 block">사건번호</label>
                                        <input type="text" value={form.caseNumber} onChange={e => setForm({...form, caseNumber: e.target.value})} placeholder="예: 2024고단1234" className="w-full px-4 py-3.5 bg-gray-100 rounded-xl placeholder:text-gray-400 focus:bg-gray-50 focus:ring-2 focus:ring-dark/10" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-medium text-gray-700 mb-2 block">피고인(가해자)</label>
                                        <input type="text" value={form.defendant} onChange={e => setForm({...form, defendant: e.target.value})} placeholder="이름" className="w-full px-4 py-3.5 bg-gray-100 rounded-xl placeholder:text-gray-400 focus:bg-gray-50 focus:ring-2 focus:ring-dark/10" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-medium text-gray-700 mb-2 block">피해자와의 관계</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {relationships.map(rel => (
                                                <Chip key={rel} selected={form.relationship === rel} onClick={() => setForm({...form, relationship: rel})}>{rel}</Chip>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case 2:
                        return (
                            <div className="fade-in">
                                <h2 className="text-xl font-semibold mb-2">피해 증상</h2>
                                <p className="text-gray-500 text-sm mb-8">해당하는 피해를 모두 선택해주세요</p>
                                <div className="grid grid-cols-2 gap-2">
                                    {damageOptions.map(opt => (
                                        <Chip key={opt.id} selected={form.damages.includes(opt.id)} onClick={() => toggleArray('damages', opt.id)}>
                                            <div className="font-medium">{opt.label}</div>
                                            <div className={`text-xs mt-0.5 ${form.damages.includes(opt.id) ? 'text-white/60' : 'text-gray-400'}`}>{opt.desc}</div>
                                        </Chip>
                                    ))}
                                </div>
                            </div>
                        );
                    case 3:
                        return (
                            <div className="fade-in">
                                <h2 className="text-xl font-semibold mb-2">가해자 태도</h2>
                                <p className="text-gray-500 text-sm mb-8">가해자의 태도를 선택해주세요 (선택사항)</p>
                                <div className="grid grid-cols-2 gap-2">
                                    {attitudeOptions.map(opt => (
                                        <Chip key={opt.id} selected={form.attitudes.includes(opt.id)} onClick={() => toggleArray('attitudes', opt.id)} variant="danger">
                                            {opt.label}
                                        </Chip>
                                    ))}
                                </div>
                            </div>
                        );
                    case 4:
                        return (
                            <div className="fade-in">
                                <h2 className="text-xl font-semibold mb-2">전하고 싶은 말</h2>
                                <p className="text-gray-500 text-sm mb-8">판사님께 전하고 싶은 말이 있다면 적어주세요</p>
                                <textarea value={form.message} onChange={e => setForm({...form, message: e.target.value})} placeholder="선택사항입니다" rows={5} className="w-full px-4 py-4 bg-gray-100 rounded-xl placeholder:text-gray-400 focus:bg-gray-50 focus:ring-2 focus:ring-dark/10 resize-none" />
                                {error && <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-xl text-sm">{error}</div>}
                                <div className="mt-4 p-3 bg-gray-50 rounded-xl flex items-center justify-between">
                                    <span className="text-sm text-gray-500">오늘 남은 무료 횟수</span>
                                    <span className="font-semibold text-dark">{usageInfo.remaining}회</span>
                                </div>
                            </div>
                        );
                }
            };

            if (page === 'landing') return <Landing onStart={() => setPage('form')} usageInfo={usageInfo} />;

            if (page === 'result') {
                return (
                    <div className="min-h-screen bg-white">
                        <div className="max-w-lg mx-auto p-5">
                            <div className="flex items-center justify-between mb-6">
                                <h1 className="text-lg font-semibold">탄원서 완성</h1>
                                <button onClick={() => { setPage('form'); setStep(0); setResult(''); }} className="text-gray-500 text-sm">다시 작성</button>
                            </div>
                            <div className="bg-gray-50 rounded-2xl p-5 mb-6">
                                <textarea value={result} onChange={e => setResult(e.target.value)} rows={16} className="w-full bg-transparent text-sm leading-relaxed resize-none focus:outline-none" />
                            </div>
                            <div className="space-y-3">
                                <button onClick={saveAsDocx} className="w-full py-4 rounded-2xl font-semibold bg-dark text-white flex items-center justify-center gap-2 btn-press hover:bg-gray-800"><Icons.Download /> 한글파일로 저장 (.docx)</button>
                                <button onClick={shareKakao} className="w-full py-4 rounded-2xl font-semibold bg-[#FEE500] text-[#191919] flex items-center justify-center gap-2 btn-press hover:bg-[#FDD800]"><Icons.Kakao /> 카카오톡으로 공유</button>
                                <div className="pt-4 border-t border-gray-100 mt-6">
                                    <p className="text-center text-gray-500 text-sm mb-3">전문가 검토로 더 완벽하게</p>
                                    <button onClick={() => setShowReviewModal(true)} className="w-full py-4 rounded-2xl font-semibold border-2 border-dark text-dark flex items-center justify-center gap-2 btn-press hover:bg-gray-50"><Icons.Shield /> 변호사 검토 받기</button>
                                </div>
                            </div>
                            {showReviewModal && <ReviewModal />}
                            <footer className="mt-12 pt-6 border-t border-gray-100 text-center">
                                <p className="text-xs text-gray-400">법률 자문 협력: 법률사무소 로앤이</p>
                                <p className="text-xs text-gray-300 mt-1">본 서비스는 참고용이며 법적 효력을 보장하지 않습니다</p>
                            </footer>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white">
                    <div className="max-w-lg mx-auto p-5">
                        <div className="flex items-center justify-between mb-6">
                            <button onClick={() => step > 0 ? setStep(step - 1) : setPage('landing')} className="p-2 -ml-2 text-gray-600"><Icons.ArrowLeft /></button>
                            <span className="text-sm text-gray-400">{step + 1} / {totalSteps}</span>
                            <div className="w-9"></div>
                        </div>
                        <Progress step={step} total={totalSteps} />
                        {renderStep()}
                        <div className="mt-8">
                            {step < totalSteps - 1 ? (
                                <button onClick={() => setStep(step + 1)} disabled={!canProceed()} className="w-full py-4 rounded-2xl font-semibold bg-dark text-white disabled:bg-gray-200 disabled:text-gray-400 flex items-center justify-center gap-2 btn-press transition-colors">다음 <Icons.ArrowRight /></button>
                            ) : (
                                <button onClick={generate} disabled={loading} className="w-full py-4 rounded-2xl font-semibold bg-dark text-white disabled:bg-gray-400 flex items-center justify-center gap-2 btn-press">{loading ? <><Icons.Loader /> 작성 중...</> : '탄원서 생성하기'}</button>
                            )}
                        </div>
                        {showReviewModal && <ReviewModal />}
                        <footer className="mt-12 pt-6 border-t border-gray-100 text-center">
                            <p className="text-xs text-gray-300">법률 자문 협력: 법률사무소 로앤이</p>
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
